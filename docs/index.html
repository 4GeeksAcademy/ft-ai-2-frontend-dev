<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Allow cross-origin requests; htmx:validateUrl below restricts them to
         a single allowlisted URL. -->
    <meta name="htmx-config" content='{"selfRequestsOnly": false}' />
    <title>ft-ai-2-frontend-dev</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans:wght@400;700&family=Inconsolata:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
      integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.js"
      integrity="sha384-ZD0fTOwPMHi7zM6WTVIWJR21I07lq0ccnqz3J6WMvQKG9thh4y7TA1QE6PJu0Af8"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!--
      Render Markdown through htmx, based on the mdmx technique
      (https://uniras.github.io/mdmx/). htmx fetches the canonical README from
      raw.githubusercontent.com on load. noHeaders avoids htmx's HX-* request
      headers, which would trigger a CORS preflight that GitHub's raw host
      rejects (403). The htmx:beforeSwap handler converts the response to HTML
    -->
    <main
      class="markdown"
      hx-get="https://raw.githubusercontent.com/4GeeksAcademy/ft-ai-2-frontend-dev/refs/heads/main/README.md"
      hx-request='{"noHeaders": true}'
      hx-trigger="load"
      hx-swap="innerHTML"
    >
      Loading…
    </main>

    <noscript>
      This page renders its content with JavaScript. View
      <a href="https://github.com/4GeeksAcademy/ft-ai-2-frontend-dev#readme">the README on GitHub</a>
      instead.
    </noscript>

    <script>
      // With selfRequestsOnly disabled, restrict htmx to this single URL.
      var ALLOWED_URL =
        "https://raw.githubusercontent.com/4GeeksAcademy/ft-ai-2-frontend-dev/refs/heads/main/README.md";

      document.body.addEventListener("htmx:validateUrl", function (event) {
        if (event.detail.url.href !== ALLOWED_URL) {
          event.preventDefault();
        }
      });

      document.body.addEventListener("htmx:beforeSwap", function (event) {
        var elt = event.detail.elt;
        if (elt && elt.classList && elt.classList.contains("markdown")) {
          event.detail.serverResponse = marked.parse(event.detail.serverResponse);
        }
      });
    </script>
  </body>
</html>
